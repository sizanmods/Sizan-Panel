<!doctype html>
<html lang="{{ lang }}">
<head>
    <meta charset="utf-8">
    <title>{{ t('reseller_panel') }} - {{ t('panel_name') }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .splash-card { text-align: center; padding: 4rem; max-width: 500px; }
        .glow-icon { font-size: 4rem; margin-bottom: 2rem; color: #ec4899; filter: drop-shadow(0 0 15px rgba(236, 72, 153, 0.4)); }
        .lang-row { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; }
        .lang-row .lang-btn { padding: 4px 12px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text-muted); text-decoration: none; transition: all 0.3s; }
        .lang-row .lang-btn:hover { border-color: #ec4899; color: #ec4899; }
        .lang-row .lang-btn.active { background: #ec4899; color: #fff; border-color: #ec4899; }
    </style>
</head>
<body>
    <div class="splash-card glass animate-fade">
        <div class="lang-row">
            {% for code, name in LANGUAGES.items() %}
            <a href="/lang/{{ code }}" class="lang-btn {% if lang == code %}active{% endif %}">{{ name }}</a>
            {% endfor %}
        </div>
        <i class="fas fa-handshake glow-icon"></i>
        <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">{{ t('reseller_panel') }}</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">{{ t('reseller_login_desc') }}</p>

        <form action="/reseller/login" method="post" style="display: flex; flex-direction: column; gap: 1rem;">
            <div class="form-group">
                <input type="text" name="username" class="input-field" placeholder="{{ t('reseller_username') }}" style="text-align: center; font-size: 1.2rem; padding: 1.2rem;" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" class="input-field" placeholder="{{ t('reseller_password') }}" style="text-align: center; font-size: 1.2rem; padding: 1.2rem;" required>
            </div>

            {% if error %}
            <div style="color: #ff4b2b; background: rgba(255, 75, 43, 0.1); padding: 10px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 1rem;">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <button type="submit" class="btn btn-primary" style="font-size: 1.1rem; padding: 1rem; width: 100%; justify-content: center; background: linear-gradient(135deg, #ec4899, #8b5cf6);">
                {{ t('reseller_login_btn') }} <i class="fas fa-sign-in-alt"></i>
            </button>
        </form>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: var(--text-muted);">
            <a href="/login" style="color: var(--primary);">{{ t('admin_login_link') }}</a>
        </p>
    </div>
</body>
</html>
